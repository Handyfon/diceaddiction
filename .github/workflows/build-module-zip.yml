name: Build and Release Module

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build module package
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Read module version
        id: version
        shell: bash
        run: |
          version="$(node -p "require('./module.json').version")"
          tag="v${version}"
          release=false

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            release=true
          elif [ "${{ github.event_name }}" = "push" ]; then
            before="${{ github.event.before }}"
            previous_version=""

            if git cat-file -e "${before}:module.json" 2>/dev/null; then
              previous_version="$(git show "${before}:module.json" | node -e "let data=''; process.stdin.on('data', chunk => data += chunk); process.stdin.on('end', () => console.log(JSON.parse(data).version));")"
            fi

            if [ "$version" != "$previous_version" ]; then
              release=true
            fi
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "release=$release" >> "$GITHUB_OUTPUT"

      - name: Prepare release manifest
        shell: bash
        env:
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
          REPOSITORY: ${{ github.repository }}
        run: |
          mkdir -p dist
          node -e "
            const fs = require('fs');
            const manifest = JSON.parse(fs.readFileSync('module.json', 'utf8'));
            manifest.manifest = 'https://github.com/' + process.env.REPOSITORY + '/releases/latest/download/module.json';
            manifest.download = 'https://github.com/' + process.env.REPOSITORY + '/releases/download/' + process.env.RELEASE_TAG + '/module.zip';
            fs.writeFileSync('dist/module.json', JSON.stringify(manifest, null, 2) + '\n');
          "

      - name: Create module.zip
        run: |
          mkdir -p dist/package
          cp dist/module.json dist/package/module.json
          cp "Used Assets Credits.txt" "dist/package/Used Assets Credits.txt"
          cp -R css faces fonts scripts textures dist/package/
          cd dist/package
          zip -r ../module.zip .

      - name: Upload module.zip
        uses: actions/upload-artifact@v4
        with:
          name: module-zip
          path: dist/module.zip
          if-no-files-found: error

      - name: Create GitHub release
        if: steps.version.outputs.release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          files: |
            dist/module.json
            dist/module.zip
          fail_on_unmatched_files: true

      - name: Publish release to FoundryVTT
        if: steps.version.outputs.release == 'true'
        uses: Varriount/fvtt-autopublish@v2.0.2
        with:
          username: ${{ secrets.FOUNDRY_ADMIN_USERNAME }}
          password: ${{ secrets.FOUNDRY_ADMIN_PASSWORD }}
          module-id: ${{ secrets.FOUNDRY_ADMIN_MODULE_ID }}
          manifest-url: https://github.com/${{ github.repository }}/releases/download/${{ steps.version.outputs.tag }}/module.json
          manifest-file: dist/module.json
