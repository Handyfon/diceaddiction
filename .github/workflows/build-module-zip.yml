name: Build Module Zip

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Create module.zip
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Create module.zip
        run: |
          mkdir package
          unzip -q diceaddiction.zip -d package
          cp module.json package/module.json
          cp "Used Assets Credits.txt" "package/Used Assets Credits.txt"
          cd package
          zip -r ../module.zip .

      - name: Upload module.zip
        uses: actions/upload-artifact@v4
        with:
          name: module-zip
          path: module.zip
          if-no-files-found: error
